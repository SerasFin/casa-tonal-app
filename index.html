<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Tonal</title>
<meta name="theme-color" content="#2C1810">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--cafe:#2C1810;--cafe-light:#6B3A2A;--crema:#F5EDD6;--crema-dark:#E8D5B0;--verde:#1D4A2A;--blanco:#FDFAF5;--texto:#1A0F0A;--texto-suave:#6B5B4E;--radio:16px;--radio-sm:10px}
body{font-family:'DM Sans',sans-serif;background:var(--blanco);color:var(--texto);min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden}
.header{background:var(--cafe);padding:1.5rem 1.25rem 1rem;position:sticky;top:0;z-index:100}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
.logo{font-family:'Playfair Display',serif;font-size:22px;color:var(--crema)}
.carrito-btn{background:var(--cafe-light);border:none;border-radius:50px;padding:.45rem .9rem;color:var(--crema);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;gap:6px;font-weight:500}
.carrito-badge{background:var(--crema);color:var(--cafe);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.tabs{display:flex;gap:8px}
.tab{padding:.4rem .9rem;border-radius:50px;border:1px solid rgba(245,237,214,.25);color:rgba(245,237,214,.6);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;background:transparent;transition:all .2s}
.tab.activo{background:var(--crema);color:var(--cafe);border-color:var(--crema);font-weight:500}
.hero{background:linear-gradient(135deg,var(--cafe) 0%,var(--cafe-light) 100%);padding:2rem 1.25rem 3rem;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:30px;background:var(--blanco);border-radius:30px 30px 0 0}
.hero h2{font-family:'Playfair Display',serif;font-size:28px;color:var(--crema);line-height:1.3;margin-bottom:.5rem}
.hero p{color:rgba(245,237,214,.7);font-size:14px;font-weight:300}
.hero-deco{position:absolute;right:-20px;top:10px;font-size:100px;opacity:.08}
.contenido{padding:1.25rem}
.seccion{margin-bottom:1.75rem}
.seccion-titulo{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:1rem;color:var(--cafe)}
.productos-lista{display:flex;flex-direction:column;gap:.75rem}
.producto-card{background:white;border-radius:var(--radio);border:.5px solid var(--crema-dark);overflow:hidden}
.producto-header{display:flex;align-items:center;gap:.75rem;padding:.85rem}
.producto-emoji{width:48px;height:48px;background:var(--crema);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.producto-info{flex:1}
.producto-nombre{font-size:14px;font-weight:500;color:var(--texto);margin-bottom:.2rem}
.producto-precio-desde{font-size:12px;color:var(--texto-suave)}
.producto-precio-unico{font-size:15px;font-weight:600;color:var(--cafe-light)}
.variantes{padding:0 .85rem .85rem;display:flex;flex-wrap:wrap;gap:.5rem}
.variante-btn{padding:.4rem .85rem;border-radius:50px;border:1px solid var(--crema-dark);background:white;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--texto-suave);transition:all .15s;white-space:nowrap}
.variante-btn:hover{border-color:var(--cafe-light);color:var(--cafe)}
.variante-btn.sel{background:var(--cafe);border-color:var(--cafe);color:var(--crema);font-weight:500}
.variante-precio{font-size:11px;opacity:.8;margin-left:3px}
.agregar-directo{margin:.85rem;margin-top:0;background:var(--cafe);color:var(--crema);border:none;border-radius:50px;padding:.5rem 1rem;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;display:flex;align-items:center;gap:6px}
.variante-agregar{width:calc(100% - 1.7rem);margin:.5rem .85rem .85rem;background:var(--cafe);color:var(--crema);border:none;border-radius:50px;padding:.6rem;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;display:none}
.variante-agregar.visible{display:block}
.panel{display:none;position:fixed;inset:0;z-index:200;background:rgba(26,15,10,.5)}
.panel.visible{display:flex;align-items:flex-end}
.panel-contenido{background:var(--blanco);border-radius:28px 28px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:1.5rem}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.panel-titulo{font-family:'Playfair Display',serif;font-size:20px;color:var(--cafe)}
.cerrar-btn{background:var(--crema);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.carrito-item{display:flex;align-items:center;gap:.75rem;padding:.75rem 0;border-bottom:.5px solid var(--crema-dark)}
.item-emoji{font-size:24px;width:44px;height:44px;background:var(--crema);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.item-info{flex:1}
.item-nombre{font-size:14px;font-weight:500;line-height:1.3}
.item-variante{font-size:12px;color:var(--texto-suave)}
.item-precio{font-size:13px;color:var(--cafe-light);font-weight:500}
.item-controles{display:flex;align-items:center;gap:8px}
.ctrl-btn{background:var(--crema);border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:14px;font-weight:600;color:var(--cafe)}
.item-cant{font-size:14px;font-weight:500;min-width:16px;text-align:center}
.tipo-entrega{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin:1rem 0}
.tipo-btn{padding:.9rem;border-radius:var(--radio);border:1.5px solid var(--crema-dark);background:white;cursor:pointer;text-align:center;transition:all .2s}
.tipo-btn.sel{border-color:var(--cafe);background:var(--cafe)}
.tipo-btn.sel .tipo-icon,.tipo-btn.sel .tipo-label{color:var(--crema)}
.tipo-icon{font-size:22px;display:block;margin-bottom:.25rem}
.tipo-label{font-size:13px;font-weight:500;color:var(--texto)}
.pago-opciones{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin:1rem 0}
.pago-btn{padding:.75rem;border-radius:var(--radio-sm);border:1.5px solid var(--crema-dark);background:white;cursor:pointer;text-align:center;font-size:13px;font-weight:500;color:var(--texto);transition:all .2s}
.pago-btn.sel{border-color:var(--cafe-light);background:var(--cafe-light);color:var(--crema)}
.campo{margin-bottom:.75rem}
.campo label{display:block;font-size:12px;color:var(--texto-suave);margin-bottom:.35rem;font-weight:500}
.campo input,.campo textarea{width:100%;padding:.65rem .85rem;border-radius:var(--radio-sm);border:1px solid var(--crema-dark);background:white;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--texto);outline:none}
.campo input:focus,.campo textarea:focus{border-color:var(--cafe-light)}
.campo textarea{resize:none;height:70px}
.dir-wrapper{position:relative}
.btn-ubicacion{width:100%;padding:.6rem .85rem;border-radius:var(--radio-sm);border:1px dashed var(--crema-dark);background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--texto-suave);cursor:pointer;display:flex;align-items:center;gap:8px;margin-bottom:.5rem;transition:all .2s}
.btn-ubicacion:hover{border-color:var(--cafe-light);color:var(--cafe)}
.btn-ubicacion.cargando{opacity:.6;cursor:not-allowed}
.sugerencias{position:absolute;top:100%;left:0;right:0;background:white;border:1px solid var(--crema-dark);border-radius:var(--radio-sm);z-index:50;overflow:hidden;box-shadow:0 4px 12px rgba(44,24,16,.1)}
.sugerencia-item{padding:.7rem .85rem;font-size:13px;cursor:pointer;border-bottom:.5px solid var(--crema-dark);color:var(--texto);display:flex;align-items:center;gap:8px}
.sugerencia-item:last-child{border-bottom:none}
.sugerencia-item:hover{background:var(--crema)}
.sugerencia-icon{font-size:14px;flex-shrink:0;color:var(--texto-suave)}
.sugerencia-texto{flex:1;line-height:1.3}
.sugerencia-principal{font-weight:500}
.sugerencia-secundario{font-size:11px;color:var(--texto-suave)}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:1rem 0;border-top:1.5px solid var(--crema-dark);margin-top:.5rem}
.total-label{font-size:14px;color:var(--texto-suave)}
.total-monto{font-family:'Playfair Display',serif;font-size:24px;color:var(--cafe)}
.pedir-btn{width:100%;background:var(--cafe);color:var(--crema);border:none;border-radius:50px;padding:1rem;font-size:16px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;margin-top:.75rem}
.pedir-btn:disabled{opacity:.5;cursor:not-allowed}
.carrito-vacio{text-align:center;padding:2rem 1rem;color:var(--texto-suave)}
.carrito-vacio .emoji{font-size:48px;display:block;margin-bottom:.75rem}
.estado-panel{padding:.5rem 0}
.estado-titulo{font-family:'Playfair Display',serif;font-size:20px;color:var(--cafe);margin-bottom:1.25rem}
.estado-paso{display:flex;align-items:center;gap:.75rem;padding:.6rem 0}
.paso-circulo{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:2px solid var(--crema-dark);background:white;color:var(--texto-suave)}
.paso-circulo.activo{background:var(--cafe);border-color:var(--cafe);color:var(--crema)}
.paso-circulo.completo{background:var(--verde);border-color:var(--verde);color:white}
.paso-info{flex:1}
.paso-nombre{font-size:14px;font-weight:500}
.paso-desc{font-size:12px;color:var(--texto-suave)}
.estado-linea{width:2px;height:20px;background:var(--crema-dark);margin-left:15px}
.estado-linea.completo{background:var(--verde)}
.notif{position:fixed;top:1rem;left:50%;transform:translateX(-50%);background:var(--cafe);color:var(--crema);padding:.6rem 1.25rem;border-radius:50px;font-size:13px;z-index:300;display:none;white-space:nowrap}
.notif.visible{display:block;animation:fadeOut 2.5s ease forwards}
@keyframes fadeOut{0%{opacity:0;transform:translateX(-50%) translateY(-8px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--texto-suave)}
.empty-state .big{font-size:48px;display:block;margin-bottom:1rem}
</style>
</head>
<body>
<div class="notif" id="notif"></div>
<header class="header">
  <div class="header-top">
    <span class="logo">Casa Tonal</span>
    <button class="carrito-btn" onclick="abrirCarrito()">
      <span>Carrito</span>
      <span class="carrito-badge" id="badge">0</span>
    </button>
  </div>
  <div class="tabs">
    <button class="tab activo" onclick="cambiarVista('menu',this)">Menú</button>
    <button class="tab" onclick="cambiarVista('pedido',this)">Mi pedido</button>
  </div>
</header>
<div id="vista-menu">
  <div class="hero">
    <div class="hero-deco">☕</div>
    <h2>Bienvenido a<br>Casa Tonal</h2>
    <p>Pedidos a domicilio · 4 km a la redonda</p>
  </div>
  <div class="contenido" id="menu-contenido">
    <div class="empty-state"><span class="big">☕</span><p>Cargando menú...</p></div>
  </div>
</div>
<div id="vista-pedido" style="display:none">
  <div class="contenido">
    <div id="estado-contenido">
      <div class="empty-state"><span class="big">🧾</span><p>No tienes pedidos activos</p></div>
    </div>
  </div>
</div>
<div class="panel" id="panel-carrito">
  <div class="panel-contenido">
    <div class="panel-header">
      <span class="panel-titulo">Tu pedido</span>
      <button class="cerrar-btn" onclick="cerrarCarrito()">✕</button>
    </div>
    <div id="carrito-items"></div>
    <div id="formulario-pedido" style="display:none">
      <div style="margin-top:1rem">
        <p style="font-size:13px;font-weight:500;color:var(--texto-suave);margin-bottom:.5rem">¿Cómo recibes tu pedido?</p>
        <div class="tipo-entrega">
          <button class="tipo-btn sel" onclick="selTipo('domicilio',this)">
            <span class="tipo-icon">🛵</span>
            <span class="tipo-label">A domicilio</span>
          </button>
          <button class="tipo-btn" onclick="selTipo('recoger',this)">
            <span class="tipo-icon">🏠</span>
            <span class="tipo-label">Recoger aquí</span>
          </button>
        </div>
        <div id="campo-direccion" class="campo">
          <label>Dirección de entrega</label>
          <button class="btn-ubicacion" id="btn-gps" onclick="usarUbicacion()">
            <span style="font-size:16px">📍</span>
            <span id="gps-texto">Usar mi ubicación actual</span>
          </button>
          <div class="dir-wrapper">
            <input type="text" id="inp-direccion" placeholder="O escribe tu calle y número..."
              autocomplete="off" oninput="onDireccionInput(this.value)" onfocus="onDireccionFocus()" />
            <div class="sugerencias" id="sugerencias" style="display:none"></div>
          </div>
        </div>
        <div class="campo">
          <label>Tu nombre</label>
          <input type="text" id="inp-nombre" placeholder="¿Cómo te llamamos?" />
        </div>
        <div class="campo">
          <label>Teléfono</label>
          <input type="tel" id="inp-tel" placeholder="Para confirmar tu pedido" />
        </div>
        <p style="font-size:13px;font-weight:500;color:var(--texto-suave);margin:.75rem 0 .5rem">¿Cómo pagas?</p>
        <div class="pago-opciones">
          <button class="pago-btn sel" onclick="selPago('efectivo',this)">💵 Efectivo</button>
          <button class="pago-btn" onclick="selPago('mercadopago',this)">📱 MercadoPago</button>
        </div>
        <div class="campo">
          <label>Notas (opcional)</label>
          <textarea id="inp-notas" placeholder="Sin azúcar, extra crema, referencia de la casa..."></textarea>
        </div>
      </div>
      <div class="total-row">
        <span class="total-label">Total</span>
        <span class="total-monto" id="total-monto">$0</span>
      </div>
      <button class="pedir-btn" id="btn-pedir" onclick="hacerPedido()">Hacer pedido</button>
    </div>
  </div>
</div>

<script>
const MAPS_KEY='AIzaSyDS0WLFnZ5B18EQyVYQZxnywUuinI0tIRs';
const SUPA_URL='https://icoikvoemymknqzsegxr.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imljb2lrdm9lbXlta25xenNlZ3hyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjMwNTYsImV4cCI6MjA5MDI5OTA1Nn0.Hr4dmj1D_a7zZVNQDomqFSbyUzaB0lfYV8yhHiu8sps';

let sb,carrito=[],tipoEntrega='domicilio',tipoPago='efectivo',pedidoActivo=null,debounce=null;

const EMOJIS={'espresso':'☕','lungo':'☕','americano':'☕','black long':'☕','latte':'☕','flat white':'☕','macchiato':'☕','capuccino':'☕','moka':'☕','chocolate caliente':'🍫','té':'🍵','tisana':'🌿','affogato':'🍨','iced':'🧊','brisa':'🥥','limonada':'🍹','marea':'💙','soda':'🫧','frappé':'🧋','malteada':'🥛','cuernito':'🥐','torta':'🥪','club sandwich':'🥪','molletes':'🍞','waffle':'🧇','extra':'➕','pay':'🥧','chocoflan':'🍮','flan':'🍮','cheesecake':'🎂'};
function getEmoji(n){const k=n.toLowerCase();for(const[e,v]of Object.entries(EMOJIS)){if(k.includes(e))return v}return'🍽️'}

// Cargar Google Maps con la nueva API async
(g=>{var h,a,k,p='The Google Maps JavaScript API',c='google',l='importLibrary',q='__ib__',m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement('script'));e.set('libraries',[...r]+'');for(k in g)e.set(k.replace(/[A-Z]/g,t=>'_'+t[0].toLowerCase()),g[k]);e.set('callback',c+'.maps.'+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+' could not load.'));a.nonce=m.querySelector('script[nonce]')?.nonce||'';m.head.append(a)}));d[l]?console.warn(p+' only loads once.'):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({key:MAPS_KEY,v:'weekly',language:'es'});

async function init(){
  try{
    sb=supabase.createClient(SUPA_URL,SUPA_KEY);
    await cargarMenu();
  }catch(e){
    document.getElementById('menu-contenido').innerHTML='<div class="empty-state"><span class="big">☕</span><p>Sin conexión al menú.<br>Verifica tu internet e intenta de nuevo.</p></div>';
  }
}

async function cargarMenu(){
  const mc=document.getElementById('menu-contenido');
  try{
    const{data:cats}=await sb.from('categorias').select('*').eq('activo',true).order('creado_en');
    const{data:prods}=await sb.from('productos').select('*').eq('activo',true);
    const{data:vars}=await sb.from('producto_variantes').select('*').eq('activo',true);
    if(!cats?.length||!prods?.length){mc.innerHTML='<div class="empty-state"><span class="big">🍽️</span><p>El menú está vacío por ahora</p></div>';return;}
    let html='';
    for(const cat of cats){
      const items=prods.filter(p=>p.categoria_id===cat.id);
      if(!items.length)continue;
      html+=`<div class="seccion"><h3 class="seccion-titulo">${cat.nombre}</h3><div class="productos-lista">`;
      for(const p of items){
        const vp=vars?vars.filter(v=>v.producto_id===p.id):[];
        const emoji=getEmoji(p.nombre);
        const base=vp.length?Math.min(...vp.map(v=>v.precio)):(p.precio||0);
        html+=`<div class="producto-card"><div class="producto-header"><div class="producto-emoji">${emoji}</div><div class="producto-info"><div class="producto-nombre">${p.nombre}</div>${vp.length>1?`<div class="producto-precio-desde">desde $${Math.round(base)}</div>`:`<div class="producto-precio-unico">$${Math.round(base)}</div>`}</div></div>`;
        if(vp.length>1){
          html+=`<div class="variantes" id="vars-${p.id}">`;
          for(const v of vp)html+=`<button class="variante-btn" onclick="selVariante('${p.id}','${v.id}','${v.nombre.replace(/'/g,"\\'")}',${v.precio},'${p.nombre.replace(/'/g,"\\'")}','${emoji}')" data-pid="${p.id}" data-vid="${v.id}">${v.nombre}<span class="variante-precio">$${Math.round(v.precio)}</span></button>`;
          html+=`</div><button class="variante-agregar" id="agr-${p.id}" onclick="confirmarVariante('${p.id}')">Agregar al carrito</button>`;
        }else if(vp.length===1){const v=vp[0];html+=`<button class="agregar-directo" onclick="agregarDirecto('${p.id}','${p.nombre.replace(/'/g,"\\'")}',${v.precio},'${emoji}','${v.nombre.replace(/'/g,"\\'")}')">+ Agregar</button>`;}
        else if(p.precio)html+=`<button class="agregar-directo" onclick="agregarDirecto('${p.id}','${p.nombre.replace(/'/g,"\\'")}',${p.precio},'${emoji}','')">+ Agregar</button>`;
        html+='</div>';
      }
      html+='</div></div>';
    }
    mc.innerHTML=html;
  }catch(e){mc.innerHTML='<div class="empty-state"><span class="big">☕</span><p>Sin conexión al menú.<br>Verifica tu internet e intenta de nuevo.</p></div>';}
}

// GPS - usar ubicación actual
function usarUbicacion(){
  if(!navigator.geolocation){mostrarNotif('Tu navegador no soporta GPS');return}
  const btn=document.getElementById('btn-gps'),txt=document.getElementById('gps-texto');
  btn.classList.add('cargando');txt.textContent='Obteniendo ubicación...';
  navigator.geolocation.getCurrentPosition(async(pos)=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    try{
      const{Geocoder}=await google.maps.importLibrary('geocoding');
      const geocoder=new Geocoder();
      const result=await geocoder.geocode({location:{lat,lng},language:'es'});
      if(result.results?.[0]){
        document.getElementById('inp-direccion').value=result.results[0].formatted_address;
        txt.textContent='Ubicación detectada';
        mostrarNotif('Ubicación agregada');
      }else{txt.textContent='No se pudo obtener la dirección';}
    }catch(e){txt.textContent='Error al obtener dirección';}
    btn.classList.remove('cargando');
  },(err)=>{
    btn.classList.remove('cargando');
    txt.textContent=err.code===1?'Permiso denegado':'No se pudo obtener ubicación';
    if(err.code===1)mostrarNotif('Puedes escribir tu dirección manualmente');
  },{enableHighAccuracy:true,timeout:8000});
}

// Autocomplete con nueva API AutocompleteSuggestion
function onDireccionInput(val){
  const sug=document.getElementById('sugerencias');
  if(!val||val.length<3){sug.style.display='none';return}
  clearTimeout(debounce);debounce=setTimeout(()=>buscarDirecciones(val),400);
}
function onDireccionFocus(){const val=document.getElementById('inp-direccion').value;if(val&&val.length>=3)buscarDirecciones(val);}

async function buscarDirecciones(texto){
  const sug=document.getElementById('sugerencias');
  try{
    const{AutocompleteSuggestion}=await google.maps.importLibrary('places');
    const req={input:texto,language:'es',region:'mx'};
    const{suggestions}=await AutocompleteSuggestion.fetchAutocompleteSuggestions(req);
    if(!suggestions||!suggestions.length){sug.style.display='none';return;}
    let html='';
    for(const s of suggestions.slice(0,4)){
      const p=s.placePrediction;
      const main=p.mainText?.text||p.text?.text||'';
      const sec=p.secondaryText?.text||'';
      const full=p.text?.text||main;
      html+=`<div class="sugerencia-item" onclick="seleccionarDireccion('${full.replace(/'/g,"\\'")}')"><span class="sugerencia-icon">📍</span><div class="sugerencia-texto"><div class="sugerencia-principal">${main}</div><div class="sugerencia-secundario">${sec}</div></div></div>`;
    }
    sug.innerHTML=html;sug.style.display='block';
  }catch(e){sug.style.display='none';}
}

function seleccionarDireccion(dir){document.getElementById('inp-direccion').value=dir;document.getElementById('sugerencias').style.display='none';}
document.addEventListener('click',function(e){if(!e.target.closest('.dir-wrapper')&&!e.target.closest('#btn-gps'))document.getElementById('sugerencias').style.display='none';});

// Carrito
const seleccionadas={};
function selVariante(pid,vid,vnombre,vprecio,pnombre,emoji){
  seleccionadas[pid]={vid,vnombre,vprecio,pnombre,emoji};
  document.querySelectorAll(`[data-pid="${pid}"]`).forEach(b=>b.classList.remove('sel'));
  document.querySelector(`[data-vid="${vid}"]`).classList.add('sel');
  const btn=document.getElementById(`agr-${pid}`);
  if(btn){btn.classList.add('visible');btn.textContent=`Agregar ${vnombre} · $${Math.round(vprecio)}`;}
}
function confirmarVariante(pid){
  const s=seleccionadas[pid];if(!s)return;
  agregarAlCarrito(pid+'-'+s.vid,s.pnombre,s.vprecio,s.emoji,s.vnombre);
  document.querySelectorAll(`[data-pid="${pid}"]`).forEach(b=>b.classList.remove('sel'));
  const btn=document.getElementById(`agr-${pid}`);if(btn)btn.classList.remove('visible');
  delete seleccionadas[pid];
}
function agregarDirecto(id,nombre,precio,emoji,variante){agregarAlCarrito(id,nombre,precio,emoji,variante);}
function agregarAlCarrito(id,nombre,precio,emoji,variante){
  const ex=carrito.find(i=>i.key===id);
  if(ex)ex.cantidad++;else carrito.push({key:id,id:id.split('-')[0],nombre,precio,emoji,variante,cantidad:1});
  actualizarBadge();mostrarNotif(`${nombre}${variante?' · '+variante:''} agregado`);
}
function actualizarBadge(){document.getElementById('badge').textContent=carrito.reduce((s,i)=>s+i.cantidad,0);}
function mostrarNotif(msg){const n=document.getElementById('notif');n.textContent=msg;n.classList.remove('visible');void n.offsetWidth;n.classList.add('visible');setTimeout(()=>n.classList.remove('visible'),2500);}
function abrirCarrito(){renderCarrito();document.getElementById('panel-carrito').classList.add('visible')}
function cerrarCarrito(){document.getElementById('panel-carrito').classList.remove('visible')}
function renderCarrito(){
  const cont=document.getElementById('carrito-items'),form=document.getElementById('formulario-pedido');
  if(!carrito.length){cont.innerHTML='<div class="carrito-vacio"><span class="emoji">🛒</span><p>Tu carrito está vacío</p></div>';form.style.display='none';return;}
  let html='',total=0;
  for(const item of carrito){const sub=item.precio*item.cantidad;total+=sub;html+=`<div class="carrito-item"><div class="item-emoji">${item.emoji}</div><div class="item-info"><div class="item-nombre">${item.nombre}</div>${item.variante?`<div class="item-variante">${item.variante}</div>`:''}<div class="item-precio">$${Math.round(sub)}</div></div><div class="item-controles"><button class="ctrl-btn" onclick="cambiarCant('${item.key}',-1)">−</button><span class="item-cant">${item.cantidad}</span><button class="ctrl-btn" onclick="cambiarCant('${item.key}',1)">+</button></div></div>`;}
  cont.innerHTML=html;document.getElementById('total-monto').textContent='$'+Math.round(total);form.style.display='block';
}
function cambiarCant(key,delta){const idx=carrito.findIndex(i=>i.key===key);if(idx<0)return;carrito[idx].cantidad+=delta;if(carrito[idx].cantidad<=0)carrito.splice(idx,1);actualizarBadge();renderCarrito();}
function selTipo(tipo,btn){tipoEntrega=tipo;document.querySelectorAll('.tipo-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');document.getElementById('campo-direccion').style.display=tipo==='domicilio'?'block':'none';}
function selPago(tipo,btn){tipoPago=tipo;document.querySelectorAll('.pago-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}
async function hacerPedido(){
  const nombre=document.getElementById('inp-nombre').value.trim(),tel=document.getElementById('inp-tel').value.trim(),dir=document.getElementById('inp-direccion').value.trim(),notas=document.getElementById('inp-notas').value.trim();
  if(!nombre||!tel){mostrarNotif('Ingresa tu nombre y teléfono');return}
  if(tipoEntrega==='domicilio'&&!dir){mostrarNotif('Ingresa tu dirección');return}
  const btn=document.getElementById('btn-pedir');btn.disabled=true;btn.textContent='Enviando pedido...';
  try{
    let{data:cliente}=await sb.from('clientes').select('id').eq('telefono',tel).single().catch(()=>({data:null}));
    if(!cliente){const{data:nc}=await sb.from('clientes').insert({nombre,telefono:tel,direccion:dir||null}).select('id').single();cliente=nc;}
    const total=carrito.reduce((s,i)=>s+(i.precio*i.cantidad),0);
    const{data:pedido}=await sb.from('pedidos').insert({cliente_id:cliente.id,tipo:tipoEntrega,pago:tipoPago,direccion_entrega:dir||null,total,notas:notas||null}).select('id').single();
    await sb.from('pedido_items').insert(carrito.map(i=>({pedido_id:pedido.id,producto_id:i.id,cantidad:i.cantidad,precio_unitario:i.precio,subtotal:i.precio*i.cantidad})));
    pedidoActivo=pedido.id;carrito=[];actualizarBadge();cerrarCarrito();mostrarNotif('¡Pedido enviado!');
    cambiarVista('pedido',document.querySelectorAll('.tab')[1]);mostrarEstadoPedido(pedido.id);
  }catch(e){mostrarNotif('Error al enviar. Intenta de nuevo.');}
  finally{btn.disabled=false;btn.textContent='Hacer pedido';}
}
async function mostrarEstadoPedido(pedidoId){
  const cont=document.getElementById('estado-contenido');
  try{
    const{data:p}=await sb.from('pedidos').select('*').eq('id',pedidoId).single();
    if(!p){cont.innerHTML='<div class="empty-state"><span class="big">🧾</span><p>No tienes pedidos activos</p></div>';return;}
    const pasos=[{id:'recibido',nombre:'Pedido recibido',desc:'Tu pedido llegó a Casa Tonal',icon:'✓'},{id:'preparando',nombre:'Preparando',desc:'Estamos preparando tu pedido',icon:'☕'},{id:p.tipo==='recoger'?'listo':'en_camino',nombre:p.tipo==='recoger'?'Listo para recoger':'En camino',desc:p.tipo==='recoger'?'Pasa por tu pedido':'Tu pedido va en camino',icon:p.tipo==='recoger'?'🏠':'🛵'},{id:'entregado',nombre:'Entregado',desc:'¡Buen provecho!',icon:'✓'}];
    const idxActual=pasos.findIndex(s=>s.id===p.estado);
    let html=`<div class="estado-panel"><h3 class="estado-titulo">Estado de tu pedido</h3><div style="background:var(--crema);border-radius:var(--radio);padding:1rem;margin-bottom:1.25rem"><p style="font-size:12px;color:var(--texto-suave);margin-bottom:.25rem">Pedido #${p.id.slice(-6).toUpperCase()}</p><p style="font-size:13px;font-weight:500">${p.tipo==='domicilio'?'Entrega a domicilio':'Recoger en tienda'} · ${p.pago==='efectivo'?'Efectivo':'MercadoPago'}</p><p style="font-size:20px;font-weight:600;color:var(--cafe);font-family:Playfair Display,serif;margin-top:.25rem">$${Math.round(p.total)}</p></div>`;
    for(let i=0;i<pasos.length;i++){const paso=pasos[i],completo=i<idxActual,activo=i===idxActual;html+=`<div class="estado-paso"><div class="paso-circulo ${completo?'completo':activo?'activo':''}">${completo?'✓':paso.icon}</div><div class="paso-info"><div class="paso-nombre" style="color:${activo?'var(--cafe)':completo?'var(--verde)':'var(--texto-suave)'}">${paso.nombre}</div>${activo?`<div class="paso-desc">${paso.desc}</div>`:''}</div></div>`;if(i<pasos.length-1)html+=`<div class="estado-linea ${completo?'completo':''}"></div>`;}
    if(p.estado!=='entregado'&&p.estado!=='cancelado')html+=`<button style="width:100%;margin-top:1.5rem;padding:.75rem;border-radius:50px;border:1px solid var(--crema-dark);background:transparent;font-family:DM Sans,sans-serif;font-size:14px;cursor:pointer;color:var(--texto-suave)" onclick="mostrarEstadoPedido('${pedidoId}')">Actualizar estado</button>`;
    html+='</div>';cont.innerHTML=html;
  }catch(e){cont.innerHTML='<div class="empty-state"><span class="big">🧾</span><p>No tienes pedidos activos</p></div>';}
}
function cambiarVista(vista,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('activo'));btn.classList.add('activo');
  document.getElementById('vista-menu').style.display=vista==='menu'?'block':'none';
  document.getElementById('vista-pedido').style.display=vista==='pedido'?'block':'none';
  if(vista==='pedido'&&pedidoActivo)mostrarEstadoPedido(pedidoActivo);
}
document.getElementById('panel-carrito').addEventListener('click',function(e){if(e.target===this)cerrarCarrito();});
init();
</script>
</body>
</html>
